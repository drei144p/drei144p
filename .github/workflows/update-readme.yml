name: update readme

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write        # ← this is the fix

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← and this

      - name: run updater
        run: node update-readme.js

      - name: commit changes
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: daily readme update"
          git push